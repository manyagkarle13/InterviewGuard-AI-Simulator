services:
  - type: web
    name: interviewguard-backend
    env: python
    buildCommand: "chmod +x ./backend/build.sh && ./backend/build.sh"
    startCommand: "cd backend && gunicorn proctor_ai.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: interviewguard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: GEMINI_API_KEY
        sync: false

  - type: psql
    name: interviewguard-db
    plan: free
